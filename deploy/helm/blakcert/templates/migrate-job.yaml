apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-migrate-{{ .Release.Revision }}"
  annotations: { "helm.sh/hook": "pre-install,pre-upgrade", "helm.sh/hook-delete-policy": "before-hook-creation" }
spec:
  backoffLimit: 1
  template:
    metadata: { labels: { app.kubernetes.io/name: blakcert, app.kubernetes.io/component: migration } }
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Release.Name }}
      containers:
        - name: migrate
          image: "{{ .Values.workerImage.repository }}:{{ .Values.workerImage.tag }}"
          command: ["npm", "run", "db:migrate"]
          envFrom:
            - configMapRef: { name: {{ .Release.Name }}-config }
            - secretRef: { name: {{ .Values.secretName }} }
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, runAsNonRoot: true, capabilities: { drop: ["ALL"] } }
