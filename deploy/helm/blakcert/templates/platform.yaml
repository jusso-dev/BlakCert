apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
data:
{{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web
spec:
  replicas: {{ .Values.replicas.web }}
  selector: { matchLabels: { app.kubernetes.io/name: blakcert, app.kubernetes.io/component: web } }
  template:
    metadata: { labels: { app.kubernetes.io/name: blakcert, app.kubernetes.io/component: web } }
    spec:
      serviceAccountName: {{ .Release.Name }}
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ name: http, containerPort: 3000 }]
          envFrom:
            - configMapRef: { name: {{ .Release.Name }}-config }
            - secretRef: { name: {{ .Values.secretName }} }
          env: [{ name: MCP_HTTP_ENABLED, value: "false" }]
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
          livenessProbe: { httpGet: { path: /health, port: http }, initialDelaySeconds: 10, periodSeconds: 15 }
          readinessProbe: { httpGet: { path: /ready, port: http }, initialDelaySeconds: 5, periodSeconds: 10 }
          resources: {{- toYaml .Values.resources.web | nindent 12 }}
          volumeMounts: [{ name: tmp, mountPath: /tmp }]
      volumes: [{ name: tmp, emptyDir: {} }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
spec:
  replicas: {{ .Values.replicas.worker }}
  selector: { matchLabels: { app.kubernetes.io/name: blakcert, app.kubernetes.io/component: worker } }
  template:
    metadata: { labels: { app.kubernetes.io/name: blakcert, app.kubernetes.io/component: worker } }
    spec:
      serviceAccountName: {{ .Release.Name }}
      terminationGracePeriodSeconds: 90
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: worker
          image: "{{ .Values.workerImage.repository }}:{{ .Values.workerImage.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef: { name: {{ .Release.Name }}-config }
            - secretRef: { name: {{ .Values.secretName }} }
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
          resources: {{- toYaml .Values.resources.worker | nindent 12 }}
          volumeMounts: [{ name: tmp, mountPath: /tmp }]
      volumes: [{ name: tmp, emptyDir: {} }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-mcp
spec:
  replicas: {{ .Values.replicas.mcp }}
  selector: { matchLabels: { app.kubernetes.io/name: blakcert, app.kubernetes.io/component: mcp } }
  template:
    metadata: { labels: { app.kubernetes.io/name: blakcert, app.kubernetes.io/component: mcp } }
    spec:
      serviceAccountName: {{ .Release.Name }}
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports: [{ name: http, containerPort: 3000 }]
          envFrom:
            - configMapRef: { name: {{ .Release.Name }}-config }
            - secretRef: { name: {{ .Values.secretName }} }
          env: [{ name: MCP_HTTP_ENABLED, value: "true" }]
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
          livenessProbe: { httpGet: { path: /health, port: http } }
          readinessProbe: { httpGet: { path: /ready, port: http } }
          resources: {{- toYaml .Values.resources.web | nindent 12 }}
          volumeMounts: [{ name: tmp, mountPath: /tmp }]
      volumes: [{ name: tmp, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-web
spec:
  selector: { app.kubernetes.io/name: blakcert, app.kubernetes.io/component: web }
  ports: [{ name: http, port: {{ .Values.service.port }}, targetPort: http }]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mcp
spec:
  selector: { app.kubernetes.io/name: blakcert, app.kubernetes.io/component: mcp }
  ports: [{ name: http, port: {{ .Values.service.port }}, targetPort: http }]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-web
spec:
  minAvailable: 1
  selector: { matchLabels: { app.kubernetes.io/name: blakcert, app.kubernetes.io/component: web } }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-default-deny
spec:
  podSelector: { matchLabels: { app.kubernetes.io/name: blakcert } }
  policyTypes: [Ingress, Egress]
  ingress:
    - from: [{ namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: ingress-nginx } } }]
      ports: [{ protocol: TCP, port: 3000 }]
  egress:
    - to: [{ namespaceSelector: {} }]
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
    - to: [{ ipBlock: { cidr: 0.0.0.0/0, except: ["169.254.0.0/16"] } }]
      ports: [{ protocol: TCP, port: 443 }, { protocol: TCP, port: 5432 }]
{{- if .Values.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-web
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: {{ .Release.Name }}-web }
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }} }
{{- end }}
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls: [{ hosts: [{{ .Values.ingress.host | quote }}], secretName: {{ .Values.ingress.tlsSecretName }} }]
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api/mcp
            pathType: Prefix
            backend: { service: { name: {{ .Release.Name }}-mcp, port: { name: http } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: {{ .Release.Name }}-web, port: { name: http } } }
{{- end }}
