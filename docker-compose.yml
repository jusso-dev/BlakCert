services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blakcert_dev
      POSTGRES_USER: blakcert
      POSTGRES_PASSWORD: dev-only
    ports: ["55432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blakcert -d blakcert_dev"]
      interval: 5s
      timeout: 3s
      retries: 20
  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: dev-only-minio
    ports: ["9100:9000", "9101:9001"]
    volumes: ["minio_data:/data"]
  web:
    build: .
    profiles: ["application"]
    env_file: .env.local
    ports: ["3000:3000"]
    depends_on:
      postgres: { condition: service_healthy }
    read_only: true
    tmpfs: ["/tmp"]
    init: true
    security_opt: ["no-new-privileges:true"]
  worker:
    build:
      context: .
      target: worker
    profiles: ["application"]
    command: npm run worker
    env_file: .env.local
    depends_on:
      postgres: { condition: service_healthy }
    init: true
    security_opt: ["no-new-privileges:true"]
volumes:
  postgres_data:
  minio_data:
